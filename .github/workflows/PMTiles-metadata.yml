name: PMTiles Metadata

on:
  workflow_dispatch:

jobs:
  metadata:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download pmtiles tool
        run: |
          wget https://github.com/protomaps/go-pmtiles/releases/download/v1.30.3/go-pmtiles_1.30.3_Linux_arm64.tar.gz
          chmod +x go-pmtiles_1.30.3_Linux_arm64
      - name: Show Metadata
        run: |
          ./go-pmtiles_1.30.3_Linux_arm64 show data/bogor.pmtiles

      - name: Show Header
        run: |
          ./go-pmtiles_1.30.3_Linux_arm64 inspect data/bogor.pmtiles
