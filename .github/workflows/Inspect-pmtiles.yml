name: Extract Vector Layers to JSON

on:
  push:
    paths:
      - 'bogor.pmtiles'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pmtiles
          # Kita gunakan pustaka pmtiles untuk membaca, 
          # dan kita buat skrip ekstraksi sederhana

      - name: Generate Extraction Script
        run: |
          cat <<EOF > extract.py
          from pmtiles.reader import Reader
          import json

          # Membaca file pmtiles
          reader = Reader("bogor.pmtiles")
          
          # Catatan: PMTiles menyimpan data dalam tile-tile kecil.
          # Untuk mengekstraksi seluruh layer ke satu GeoJSON, 
          # kita perlu melakukan proses 'tiled-to-geojson'
          # (Untuk demo ini, kita ambil metadata layer sebagai referensi)
          
          metadata = reader.header().metadata
          with open("vector_layers_info.json", "w") as f:
              json.dump(metadata, f, indent=4)
          
          print("Metadata layer berhasil diekstraksi ke vector_layers_info.json")
          EOF

      - name: Run Extraction
        run: python extract.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: extracted-layers
          path: vector_layers_info.json
          
