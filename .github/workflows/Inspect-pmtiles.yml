name: Extract Vector Layers from PMTiles

on:
  push:
    paths:
      - 'data/bogor.pmtiles'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pmtiles
          # Opsional: Jika Anda butuh konversi lebih lanjut, gunakan geopandas atau fiona

      - name: Extract metadata and layers
        run: |
          # Menggunakan pmtiles CLI untuk mendapatkan daftar layer
          # Anda perlu menginstal node/npm untuk pmtiles CLI
          sudo npm install -g pmtiles
          
          echo "Menampilkan informasi layer:"
          pmtiles show data/bogor.pmtiles > layers_info.json
          
          echo "Ekstraksi selesai, silakan cek file layers_info.json"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: vector-layers-metadata
          path: layers_info.json
          
