name: Show PMTiles Vector Layers

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download PMTiles CLI
        run: |
          wget -O pmtiles https://github.com/protomaps/go-pmtiles/releases/latest/download/pmtiles-linux-amd64
          chmod +x pmtiles

      - name: Inspect PMTiles Header
        run: |
          ./pmtiles show data/bogor.pmtiles > pmtiles-info.txt
          cat pmtiles-info.txt

      - name: Extract Vector Layers
        run: |
          echo "===== VECTOR LAYERS ====="
          grep -A 200 "vector_layers" pmtiles-info.txt || true

      - name: Save Inspection Result
        uses: actions/upload-artifact@v4
        with:
          name: pmtiles-inspection
          path: pmtiles-info.txt
